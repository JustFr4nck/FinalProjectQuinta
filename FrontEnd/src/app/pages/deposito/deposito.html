<!-- Background Animation (Pioggia) -->
<div class="fixed inset-0 pointer-events-none overflow-hidden bg-black z-0">
  <div *ngFor="let item of moneyRain"
       class="money-item absolute font-black select-none"
       [style.left.%]="item.left"
       [style.animation-duration.s]="item.duration"
       [style.animation-delay.s]="item.delay"
       [style.font-size.px]="item.size"
       [style.opacity]="item.opacity"
       [style.filter]="'blur(' + item.blur + ')'"
       [style.z-index]="item.zIndex">
    <span [ngClass]="item.id % 2 === 0 ? 'text-emerald-500' : 'text-green-500'">
      {{ item.char }}
    </span>
  </div>
</div>

<div class="min-h-screen flex items-center justify-center p-4 relative bg-transparent font-sans">
  <div class="particle-container">
    <span *ngFor="let p of particles"
          class="particle text-3xl"
          [style.--tx.px]="p.x"
          [style.--ty.px]="p.y"
          [style.--tr.deg]="p.rotate">
      {{ p.icon }}
    </span>
  </div>

  <div class="w-full max-w-md z-10">
    <div class="bg-gradient-to-br from-green-950/20 to-black backdrop-blur-3xl border border-green-500/20 rounded-[2.5rem] p-8 shadow-[0_0_50px_rgba(34,197,94,0.1)] relative group">

      <div class="text-center mb-6">
        <p class="text-green-500 text-[9px] font-mono tracking-[0.4em] uppercase mb-2">Security_Level: High</p>
        <h1 class="text-3xl font-black text-white uppercase tracking-tighter">New Deposit</h1>
      </div>


      <div class="mb-6 p-4 rounded-2xl bg-black/40 border border-green-500/10 flex justify-between items-center">
        <div>
          <p class="text-[8px] text-green-500/50 uppercase tracking-widest mb-1">Current Balance</p>
          <p class="text-xl font-mono font-black text-white">€ {{ saldoAttuale.toFixed(2) }}</p>
        </div>
        <div class="text-right">
          <p class="text-[8px] text-green-500/50 uppercase tracking-widest mb-1">Inflow Limit</p>
          <span class="inline-flex items-center px-2 py-0.5 rounded text-[9px] font-mono bg-green-500/10 text-green-400 border border-green-500/20">
            UNLIMITED
          </span>
        </div>
      </div>

      <div class="space-y-6">
        <div class="relative">
          <label class="text-[8px] text-green-500/50 uppercase tracking-widest ml-4 mb-2 block">Amount to Inject</label>
          <div class="relative">
            <span class="absolute left-6 top-1/2 -translate-y-1/2 text-green-500 font-bold">€</span>
            <input type="number" [(ngModel)]="importo" class="w-full bg-black/60 border border-green-500/20 rounded-2xl py-5 pl-12 pr-6 text-2xl font-black text-white focus:border-green-500 outline-none transition-all placeholder:text-green-950" placeholder="0.00"/>
          </div>


          <div class="grid grid-cols-4 gap-2 mt-2 px-1">
            <button
              *ngFor="let quickAmount of tagliRapidi"
              type="button"
              (click)="selezionaImportoRapido(quickAmount)"
              class="py-2 rounded-xl bg-green-950/20 border border-green-500/10 text-xs font-mono text-green-400 hover:bg-green-500/20 hover:text-white transition-all active:scale-95"
            >
              +€{{ quickAmount }}
            </button>
          </div>
        </div>

        <div class="relative">
          <label class="text-[8px] text-green-500/50 uppercase tracking-widest ml-4 mb-2 block">Reason / Label</label>
          <input
            type="text"
            [(ngModel)]="descrizione"
            class="w-full bg-black/60 border border-green-500/20 rounded-2xl py-4 px-6 text-sm font-mono text-green-400 focus:border-green-500 outline-none transition-all placeholder:text-green-950/50"
            placeholder="E.g. Monthly Savings, Gift, Bonus..."
          />
        </div>

        <button
          (click)="faiDeposito()"
          [disabled]="importo <= 0"
          class="relative w-full py-5 text-white font-black uppercase tracking-[0.2em] rounded-2xl transition-all active:scale-95 shadow-[0_0_25px_rgba(22,163,74,0.4)] disabled:opacity-40 disabled:cursor-not-allowed disabled:scale-100 disabled:shadow-none bg-green-600 hover:bg-green-500"
        >
          <span *ngIf="importo <= 0">Enter Amount</span>
          <span *ngIf="importo > 0">Confirm Deposit</span>
        </button>
      </div>

      <p class="mt-8 text-green-500/20 text-[7px] text-center uppercase tracking-[0.5em]">
        Transaction_Encrypted_v2.0 // Hash: {{ (importo * 1.2).toFixed(0) }}
      </p>
    </div>
  </div>
</div>
